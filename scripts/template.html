<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Starknet Sepolia Auto-Deployer</title>
    <!-- Starknet.js Core - load FIRST and save reference before wallet overwrites window.starknet -->
    <script src="https://unpkg.com/starknet@6.11.0/dist/index.js"></script>
    <script>
        // Save library reference before any wallet extension can overwrite window.starknet
        window.__StarknetLib = window.starknet;
        console.log('StarknetLib saved:', window.__StarknetLib ? 'OK' : 'FAILED');
    </script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            padding: 2rem;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 0.8rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }

        h1 {
            color: #3b82f6;
            text-align: center;
            margin-bottom: 2rem;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        button:hover {
            background: #2563eb;
        }

        button:disabled {
            background: #64748b;
            cursor: not-allowed;
        }

        .success {
            color: #34d399;
            margin-top: 0.8rem;
            border-left: 4px solid #059669;
            padding: 0.5rem 1rem;
            background: #064e3b33;
        }

        .error {
            color: #f87171;
            margin-top: 0.8rem;
            border-left: 4px solid #dc2626;
            padding: 0.5rem 1rem;
            background: #450a0a33;
        }

        .step {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
            padding: 1.2rem 0;
            gap: 2rem;
        }

        .step:last-child {
            border-bottom: none;
        }

        .step-info {
            flex: 1;
        }

        .hash {
            font-family: monospace;
            background: #020617;
            padding: 0.2rem 0.4rem;
            border-radius: 0.3rem;
            font-size: 0.8rem;
            color: #94a3b8;
            word-break: break-all;
        }

        pre#log {
            background: #020617;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            height: 200px;
            overflow-y: scroll;
            font-size: 0.8rem;
        }

        .loader {
            border: 2px solid #334155;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 4px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <h1>🚀 ProofPass Sepolia Auto-Deployer</h1>

    <div class="card">
        <h3>1. Conectar Wallet</h3>
        <button id="connectBtn">Conectar Wallet</button>
        <span id="accountStatus" style="margin-left:1rem; font-size: 0.9rem;">No conectado</span>
        <div id="networkError" class="error" style="display:none; margin-top: 0.5rem;">⚠️ Cambia a <b>Starknet
                Sepolia</b> en tu wallet.</div>
    </div>

    <div class="card">
        <h3>2. Desplegar Contratos</h3>
        <p style="color: #94a3b8; font-size: 0.9rem;">⚠️ Despliega uno por uno en orden. Espera "✅ Éxito" antes del
            siguiente.</p>
        <div id="steps"></div>
    </div>

    <div class="card">
        <h3>3. Variables para .env.local / Vercel</h3>
        <pre id="finalResults">Esperando...</pre>
        <button id="copyBtn" disabled style="background: #10b981; margin-top: 0.5rem;">Copiar al Portapapeles</button>
    </div>

    <div class="card">
        <h3>Logs</h3>
        <pre id="log">--- Iniciando ---\n</pre>
    </div>

    <script>
        const ARTIFACTS = __ARTIFACTS_JSON__;
        let account;
        const addresses = {};

        // Use our saved library reference, NOT window.starknet (which is now the wallet)
        const lib = window.__StarknetLib;
        // Alchemy v0.7 RPC (v2 URL) works better with 'pending' block tag
        const RPC_URL = 'https://starknet-sepolia.g.alchemy.com/v2/MnGSA2Mjm9SFFPUCuXWdP';

        const logEl = document.getElementById('log');
        function log(msg, err = false) {
            const s = document.createElement('span');
            s.style.color = err ? '#f87171' : '#94a3b8';
            s.innerText = `[${new Date().toLocaleTimeString()}] ${msg}\n`;
            logEl.appendChild(s);
            logEl.scrollTop = logEl.scrollHeight;
        }

        // Verify library loaded correctly
        if (lib && lib.hash) {
            log('✅ Starknet.js cargado correctamente.');
        } else {
            log('❌ Error: Starknet.js no cargó. Prueba recargar la página.', true);
        }

        function updateFinal() {
            let txt = '';
            if (addresses.MockERC20) txt += 'NEXT_PUBLIC_STRKBTC_ADDRESS=' + addresses.MockERC20 + '\n';
            if (addresses.ProofVerifier) txt += 'NEXT_PUBLIC_PROOF_VERIFIER_ADDRESS=' + addresses.ProofVerifier + '\n';
            if (addresses.GateAdapter) txt += 'NEXT_PUBLIC_GATE_ADAPTER_ADDRESS=' + addresses.GateAdapter + '\n';
            if (addresses.PolicyRegistry) txt += 'NEXT_PUBLIC_POLICY_REGISTRY_ADDRESS=' + addresses.PolicyRegistry + '\n';
            document.getElementById('finalResults').innerText = txt || 'Esperando...';
            if (txt) document.getElementById('copyBtn').disabled = false;
        }

        const names = ['MockERC20', 'ProofVerifier', 'GateAdapter', 'PolicyRegistry'];
        names.forEach(name => {
            const div = document.createElement('div');
            div.className = 'step';
            div.innerHTML = `
            <div class="step-info">
                <strong>${name}</strong>
                <div id="s-${name}" style="font-size:0.8rem; color:#64748b;">En espera de conexión...</div>
            </div>
            <button id="b-${name}" disabled>Desplegar</button>
        `;
            document.getElementById('steps').appendChild(div);

            document.getElementById('b-' + name).onclick = async () => {
                const btn = document.getElementById('b-' + name);
                const st = document.getElementById('s-' + name);
                btn.disabled = true;
                try {
                    const { sierra, casm } = ARTIFACTS[name];
                    // Use the saved library reference to compute hash
                    const classHash = lib.hash.computeSierraContractClassHash(sierra);
                    log(`${name}: classHash = ${classHash}`);

                    st.innerHTML = '<div class="loader"></div>Declarando clase...';
                    try {
                        // Version 2 (maxFee) is much more robust for large contract declarations
                        const d = await account.declare({ contract: sierra, casm }, {
                            version: 2,
                            maxFee: '0x2386f26fc10000' // 0.01 ETH
                        });
                        log(`TX declare ${name}: ${d.transaction_hash}`);
                        st.innerHTML = '<div class="loader"></div>Esperando confirmación de declare...';
                        await account.waitForTransaction(d.transaction_hash);
                        log(`${name}: clase declarada.`);
                    } catch (e) {
                        if (!e.message.toLowerCase().includes('already declared')) throw e;
                        log(`${name}: clase ya declarada, continuando.`);
                    }

                    let calldata = [];
                    if (name === 'MockERC20') calldata = [account.address, '1000000000', '0'];
                    if (name === 'ProofVerifier') calldata = ['0x6eb62dc263aa156dd37a146aa1d1021357bfffa47ca23479a4c3844d9282ce6'];
                    if (name === 'GateAdapter') calldata = [addresses.MockERC20, addresses.ProofVerifier];
                    if (name === 'PolicyRegistry') calldata = [account.address];

                    st.innerHTML = '<div class="loader"></div>Desplegando instancia...';
                    const { transaction_hash, contract_address } = await account.deployContract({
                        classHash, constructorCalldata: calldata
                    });
                    log(`TX deploy ${name}: ${transaction_hash}`);
                    st.innerHTML = '<div class="loader"></div>Esperando confirmación de deploy...';
                    await account.waitForTransaction(transaction_hash);

                    addresses[name] = contract_address;
                    st.className = 'success';
                    st.innerHTML = '✅ <span class="hash">' + contract_address + '</span>';
                    log(`¡${name} desplegado en ${contract_address}!`);
                    updateFinal();
                } catch (e) {
                    log(`ERROR ${name}: ${e.message}`, true);
                    st.className = 'error';
                    st.innerHTML = 'Error: ' + e.message;
                    btn.disabled = false;
                }
            };
        });

        document.getElementById('connectBtn').onclick = async () => {
            log('Escaneando wallets disponibles...');

            let walletObj = null;
            const skip = new Set(['window', 'self', 'top', 'parent', 'frames', 'document', 'location', 'history', 'navigator', 'screen', 'performance', 'crypto', 'indexedDB', 'localStorage', 'sessionStorage', 'caches', 'console', 'alert', 'confirm', 'prompt', '__StarknetLib']);

            for (const key of Object.getOwnPropertyNames(window)) {
                try {
                    if (skip.has(key)) continue;
                    const val = window[key];
                    if (val && typeof val === 'object' && (typeof val.enable === 'function' || typeof val.request === 'function')) {
                        if (val.id || val.name || val.version || val.icon) {
                            log(`Wallet: window.${key} (${val.id || val.name || 'sin nombre'})`);
                            walletObj = val;
                            break;
                        }
                    }
                } catch (e) { }
            }

            if (!walletObj) {
                const starkKeys = Object.keys(window).filter(k => k.toLowerCase().includes('stark') || k.toLowerCase().includes('wallet') || k.toLowerCase().includes('ready') || k.toLowerCase().includes('argent') || k.toLowerCase().includes('braavos'));
                log('Keys relevantes en window: ' + (starkKeys.join(', ') || 'ninguna'), true);
                log('No se detectó ninguna wallet compatible.', true);
                return;
            }

            try {
                await walletObj.enable();
                account = walletObj.account;
                const chainId = await account.getChainId();
                log(`Red: ${chainId}`);

                const isSepolia = chainId === '0x534e5f5345504f4c4941' || chainId.toLowerCase().includes('sepolia');
                if (!isSepolia) {
                    document.getElementById('networkError').style.display = 'block';
                    log('ERROR: Cambia tu wallet a red Sepolia.', true);
                } else {
                    document.getElementById('networkError').style.display = 'none';
                    document.getElementById('accountStatus').innerText = '✅ ' + account.address.slice(0, 12) + '...';
                    document.querySelectorAll('button').forEach(b => { if (b.id !== 'copyBtn') b.disabled = false; });
                    log('¡Listo! Puedes desplegar los contratos.');
                }
            } catch (e) {
                log('Error al conectar: ' + e.message, true);
            }
        };

        document.getElementById('copyBtn').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('finalResults').innerText);
            alert('¡Copiado! Ahora pégalo en .env.local y en Vercel.');
        };
    </script>
</body>

</html>
