<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Starknet Sepolia Auto-Deployer</title>
    <!-- Starknet.js Core -->
    <script src="https://unpkg.com/starknet@6.11.0/dist/index.js"></script>
    <!-- get-starknet Library -->
    <script src="https://unpkg.com/get-starknet@3.3.3/dist/index.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 2rem;
            max-width: 900px;
            margin: auto;
            line-height: 1.6;
        }

        .card {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 0.8rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h1 {
            color: #3b82f6;
            text-align: center;
            margin-bottom: 2rem;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 1rem;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        button:disabled {
            background: #64748b;
            cursor: not-allowed;
            transform: none;
        }

        .success {
            color: #34d399;
            font-size: 0.9rem;
            margin-top: 0.8rem;
            border-left: 4px solid #059669;
            padding: 0.5rem 0.5rem 0.5rem 1rem;
            background: #064e3b33;
        }

        .error {
            color: #f87171;
            font-size: 0.9rem;
            margin-top: 0.8rem;
            border-left: 4px solid #dc2626;
            padding: 0.5rem 0.5rem 0.5rem 1rem;
            background: #450a0a33;
        }

        .step {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
            padding: 1.2rem 0;
            gap: 2rem;
        }

        .step-info {
            flex: 1;
        }

        .hash {
            font-family: monospace;
            background: #020617;
            padding: 0.2rem 0.5rem;
            border-radius: 0.3rem;
            display: inline-block;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        pre#log {
            background: #020617;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            height: 180px;
            overflow-y: scroll;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 1rem;
        }

        .loader {
            border: 2px solid #334155;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 5px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <h1>🚀 ProofPass Sepolia Auto-Deployer</h1>

    <div class="card">
        <h3>1. Conexión de Wallet</h3>
        <button id="connectBtn">Conectar Argent X / Braavos</button>
        <span id="accountStatus" style="margin-left: 1rem; font-family: monospace;">No conectado</span>
        <div id="networkError" class="error" style="display:none;">⚠️ Debes estar en la red <b>Starknet Sepolia</b>.
        </div>
    </div>

    <div class="card">
        <h3>2. Despliegue de Contratos</h3>
        <div id="steps"></div>
    </div>

    <div class="card">
        <h3>3. Datos para Vercel (.env.local)</h3>
        <pre id="finalResults">Esperando despliegues...</pre>
        <button id="copyBtn" disabled style="background: #10b981;">Copiar al Portapapeles</button>
    </div>

    <div class="card">
        <h3>🖥️ Registro Detallado (Logs)</h3>
        <pre id="log">--- Herramienta Iniciada ---\n</pre>
    </div>

    <script>
        const ARTIFACTS = __ARTIFACTS_JSON__;
        let wallet, account;
        const addresses = {};
        const stepsDiv = document.getElementById('steps');
        const logPre = document.getElementById('log');

        function addLog(msg, isError = false) {
            const span = document.createElement('span');
            span.style.color = isError ? '#f87171' : '#94a3b8';
            span.innerText = `[${new Date().toLocaleTimeString()}] ${msg}\n`;
            logPre.appendChild(span);
            logPre.scrollTop = logPre.scrollHeight;
        }

        function updateFinal() {
            const pre = document.getElementById('finalResults');
            let txt = "";
            if (addresses['MockERC20']) txt += "NEXT_PUBLIC_STRKBTC_ADDRESS=" + addresses['MockERC20'] + "\n";
            if (addresses['ProofVerifier']) txt += "NEXT_PUBLIC_PROOF_VERIFIER_ADDRESS=" + addresses['ProofVerifier'] + "\n";
            if (addresses['GateAdapter']) txt += "NEXT_PUBLIC_GATE_ADAPTER_ADDRESS=" + addresses['GateAdapter'] + "\n";
            if (addresses['PolicyRegistry']) txt += "NEXT_PUBLIC_POLICY_REGISTRY_ADDRESS=" + addresses['PolicyRegistry'] + "\n";
            pre.innerText = txt || "Esperando despliegues...";
            if (txt) document.getElementById('copyBtn').disabled = false;
        }

        const names = ['MockERC20', 'ProofVerifier', 'GateAdapter', 'PolicyRegistry'];

        names.forEach(name => {
            const div = document.createElement('div');
            div.className = 'step';
            div.innerHTML = `
                <div class="step-info">
                    <strong>${name}</strong>
                    <div id="status-${name}" style="font-size: 0.8rem; color: #64748b;">Listo para empezar</div>
                </div>
                <button id="btn-${name}" disabled>Desplegar</button>
            `;
            stepsDiv.appendChild(div);

            document.getElementById('btn-' + name).onclick = async () => {
                const btn = document.getElementById('btn-' + name);
                const status = document.getElementById('status-' + name);
                btn.disabled = true;
                addLog(`Iniciando ${name}...`);

                try {
                    const { sierra, casm } = ARTIFACTS[name];
                    // Usamos window.starknet para el core si está disponible
                    const lib = window.starknet || window.Starknet;
                    const sierraClassHash = lib.hash.computeSierraContractClassHash(sierra);

                    status.innerHTML = '<div class="loader"></div> Declarando clase...';
                    try {
                        const d = await account.declare({ contract: sierra, casm: casm });
                        addLog(`TX Declarar: ${d.transaction_hash}`);
                        await account.waitForTransaction(d.transaction_hash);
                    } catch (e) {
                        if (e.message.toLowerCase().includes("already declared")) {
                            addLog(`Clase ya declarada.`);
                        } else throw e;
                    }

                    let calldata = [];
                    if (name === 'MockERC20') calldata = [account.address, "1000000000", "0"];
                    if (name === 'ProofVerifier') calldata = ["0x6eb62dc263aa156dd37a146aa1d1021357bfffa47ca23479a4c3844d9282ce6"];
                    if (name === 'GateAdapter') calldata = [addresses['MockERC20'], addresses['ProofVerifier']];
                    if (name === 'PolicyRegistry') calldata = [account.address];

                    status.innerHTML = '<div class="loader"></div> Desplegando instancia...';
                    const { transaction_hash, contract_address } = await account.deployContract({
                        classHash: sierraClassHash,
                        constructorCalldata: calldata
                    });

                    addLog(`TX Deploy: ${transaction_hash}`);
                    await account.waitForTransaction(transaction_hash);

                    addresses[name] = contract_address;
                    status.className = "success";
                    status.innerHTML = "Éxito: " + contract_address;
                    addLog(`Contrato ${name} desplegado.`);
                    updateFinal();
                } catch (e) {
                    addLog(`ERROR: ${e.message}`, true);
                    status.className = "error";
                    status.innerHTML = "Error: " + e.message;
                    btn.disabled = false;
                }
            };
        });

        document.getElementById('connectBtn').onclick = async () => {
            addLog("Buscando extensión de Starknet...");
            try {
                // Buscamos cualquier rastro de connect en window
                let connectFn = null;
                const globals = ['GetStarknet', 'getStarknet', 'starknet', 'starknet_argent', 'starknet_braavos'];

                for (let g of globals) {
                    if (window[g]) {
                        if (typeof window[g].connect === 'function') connectFn = (opt) => window[g].connect(opt);
                        else if (typeof window[g] === 'function') connectFn = window[g];
                    }
                }

                if (!connectFn) {
                    // Escaneo total por si acaso
                    for (let key in window) {
                        if (key.toLowerCase().includes('stark') && window[key] && typeof window[key].connect === 'function') {
                            addLog(`Encontrado en window.${key}`);
                            connectFn = (opt) => window[key].connect(opt);
                            break;
                        }
                    }
                }

                if (!connectFn) throw new Error("No se detectó Argent X o Braavos. ¿Están instalados?");

                wallet = await connectFn({ modalMode: "alwaysAsk" });

                if (wallet) {
                    await wallet.enable();
                    account = wallet.account;
                    const chainId = await account.getChainId();
                    addLog(`Red detectada: ${chainId}`);

                    if (!chainId.toLowerCase().includes("sepolia") && chainId !== "0x534e5f5345504f4c4941") {
                        document.getElementById('networkError').style.display = 'block';
                        addLog("CAMBIA A RED SEPOLIA EN TU WALLET", true);
                    } else {
                        document.getElementById('networkError').style.display = 'none';
                        document.getElementById('accountStatus').innerText = "✅ Conectado";
                        document.querySelectorAll('button').forEach(b => { if (b.id !== 'copyBtn') b.disabled = false; });
                        addLog("Wallet vinculada correctamente.");
                    }
                }
            } catch (e) {
                addLog(`Fallo de conexión: ${e.message}`, true);
            }
        };

        document.getElementById('copyBtn').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('finalResults').innerText);
            alert("¡Copiado! Ahora pégalo en .env.local de Vercel.");
        };
    </script>
</body>

</html>
