    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 2rem;
            max-width: 900px;
            margin: auto;
            line-height: 1.6;
        }

        .card {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 0.8rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h1 {
            color: #3b82f6;
            text-align: center;
            margin-bottom: 2rem;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 1rem;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        button:disabled {
            background: #64748b;
            cursor: not-allowed;
            transform: none;
        }

        .success {
            color: #34d399;
            font-size: 0.9rem;
            margin-top: 0.8rem;
            border-left: 4px solid #059669;
            padding: 0.5rem 0.5rem 0.5rem 1rem;
            background: #064e3b33;
        }

        .error {
            color: #f87171;
            font-size: 0.9rem;
            margin-top: 0.8rem;
            border-left: 4px solid #dc2626;
            padding: 0.5rem 0.5rem 0.5rem 1rem;
            background: #450a0a33;
        }

        .step {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
            padding: 1.2rem 0;
            gap: 2rem;
        }

        .step-info {
            flex: 1;
        }

        .hash {
            font-family: monospace;
            background: #020617;
            padding: 0.2rem 0.5rem;
            border-radius: 0.3rem;
            display: inline-block;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        pre#log {
            background: #020617;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            height: 180px;
            overflow-y: scroll;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 1rem;
        }

        .loader {
            border: 2px solid #334155;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 5px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

        let wallet, account;

            span.innerText = `[${new Date().toLocaleTimeString()}] ${msg}\n`;

                    if (window[g]) {
                        if (typeof window[g].connect === 'function') connectFn = (opt) => window[g].connect(opt);
                        else if (typeof window[g] === 'function') connectFn = window[g];
                    }
                }

                if (!connectFn) {
                    // Escaneo total por si acaso
                    for (let key in window) {
                        if (key.toLowerCase().includes('stark') && window[key] && typeof window[key].connect === 'function') {
                            addLog(`Encontrado en window.${key}`);
                            connectFn = (opt) => window[key].connect(opt);
                            break;
                        }
                    }
                }

                if (!connectFn) throw new Error("No se detectó Argent X o Braavos. ¿Están instalados?");

                wallet = await connectFn({ modalMode: "alwaysAsk" });

                if (wallet) {
                    await wallet.enable();
                    account = wallet.account;
                    const chainId = await account.getChainId();
                    addLog(`Red detectada: ${chainId}`);

                    if (!chainId.toLowerCase().includes("sepolia") && chainId !== "0x534e5f5345504f4c4941") {
                        document.getElementById('networkError').style.display = 'block';
                        addLog("CAMBIA A RED SEPOLIA EN TU WALLET", true);
                    } else {
                        document.getElementById('networkError').style.display = 'none';
                        document.getElementById('accountStatus').innerText = "✅ Conectado";
                        document.querySelectorAll('button').forEach(b => { if (b.id !== 'copyBtn') b.disabled = false; });
                        addLog("Wallet vinculada correctamente.");
                    }
                }
            } catch (e) {
                addLog(`Fallo de conexión: ${e.message}`, true);
            }
        };

        document.getElementById('copyBtn').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('finalResults').innerText);
            alert("¡Copiado! Ahora pégalo en .env.local de Vercel.");
        };
    </script>
</body>

</html>
